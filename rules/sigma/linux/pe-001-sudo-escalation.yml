title: Suspicious Sudo Privilege Escalation
id: pe-001-sudo-escalation
status: production
description: |
  Detects suspicious sudo usage patterns that may indicate privilege
  escalation attempts, including sudo to root with unusual commands.
references:
  - https://attack.mitre.org/techniques/T1548/003/
author: SOC Team
date: 2024/02/10
modified: 2024/06/01
tags:
  - attack.privilege_escalation
  - attack.t1548
  - attack.t1548.003
logsource:
  category: process_creation
  product: linux
detection:
  selection_sudo:
    process_name: sudo
    source_type: linux
  selection_suspicious:
    command_line|contains:
      - '/bin/bash'
      - '/bin/sh'
      - 'passwd'
      - 'chmod 777'
      - 'chown root'
      - 'useradd'
      - 'usermod'
      - 'visudo'
      - '/etc/shadow'
      - 'nc -e'
      - 'ncat'
      - 'python -c'
      - 'perl -e'
  condition: selection_sudo and selection_suspicious
falsepositives:
  - System administrators performing legitimate operations
  - Automated deployment scripts
level: medium
