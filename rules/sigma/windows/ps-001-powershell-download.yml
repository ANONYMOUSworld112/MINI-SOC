title: Suspicious PowerShell Download Cradle
id: ps-001-download-cradle
status: production
description: |
  Detects PowerShell commands commonly used to download and execute payloads
  from remote servers. This pattern is frequently used by threat actors for
  initial access and payload delivery.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1105/
author: SOC Team
date: 2024/01/15
modified: 2024/06/01
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1105
logsource:
  category: process_creation
  product: windows
detection:
  selection_process:
    process_name|endswith:
      - 'powershell.exe'
      - 'pwsh.exe'
  selection_cmdline:
    command_line|contains:
      - 'Net.WebClient'
      - 'DownloadString'
      - 'DownloadFile'
      - 'Invoke-WebRequest'
      - 'IWR'
      - 'Invoke-RestMethod'
      - 'IRM'
      - 'wget'
      - 'curl'
      - 'Start-BitsTransfer'
  condition: selection_process and selection_cmdline
falsepositives:
  - Legitimate software installation scripts
  - System administration tools
  - Package managers
level: high
