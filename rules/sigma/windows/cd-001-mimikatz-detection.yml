title: Credential Dumping via Mimikatz
id: cd-001-mimikatz-detection
status: production
description: |
  Detects execution of Mimikatz or similar credential dumping tools based on
  process name, command line arguments, and known indicators.
references:
  - https://attack.mitre.org/techniques/T1003/
  - https://attack.mitre.org/techniques/T1003/001/
author: SOC Team
date: 2024/01/15
modified: 2024/06/01
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_names:
    process_name|contains:
      - 'mimikatz'
      - 'mimi32'
      - 'mimi64'
  selection_cmdline:
    command_line|contains:
      - 'sekurlsa'
      - 'kerberos::list'
      - 'privilege::debug'
      - 'lsadump'
      - 'crypto::certificates'
      - 'dpapi::masterkey'
      - 'token::elevate'
  selection_hashes:
    process_name|endswith: '.exe'
    command_line|contains:
      - 'log mimikatz'
      - 'privilege::debug'
  condition: selection_names or selection_cmdline or selection_hashes
falsepositives:
  - Authorized penetration testing
  - Security tool testing in lab environments
level: critical
